<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Brutalist / Imperial Styling Additions */
        .imperial-border {
            border: 1px solid theme('colors.secondary');
            box-shadow: inset 0 0 10px rgba(233, 193, 118, 0.1);
        }
        .data-bracket {
            border-bottom: 2px solid theme('colors.surface-variant');
        }
        .glow-active {
            box-shadow: 0 0 15px rgba(255, 180, 172, 0.3);
        }
        .scan-line-bg {
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(233, 193, 118, 0.03) 2px,

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md scan-line-bg">
<!-- Top Navigation (Shell suppressed based on instructions, but keeping a minimal header for context if needed, though instructions say "Linear/Transactional" -> suppress nav. Result screen is transactional. Thus, NO global nav.) -->
<!-- Main Content Canvas -->
<main class="flex-1 flex items-center justify-center p-gutter md:p-margin-safe relative overflow-hidden">
<!-- Fog/Smoke Effect Layer (CSS based) -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at center, transparent 0%, theme('colors.background') 100%);"></div>
<!-- Central Result Panel -->
<div class="relative w-full max-w-4xl bg-surface-container border border-secondary/30 flex flex-col shadow-2xl backdrop-blur-sm z-10">
<!-- Imperial Header -->
<header class="p-8 text-center border-b border-secondary/30 bg-surface-container-highest relative">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary to-transparent opacity-50"></div>
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary to-transparent opacity-50"></div>
<h1 class="font-display-lg text-display-lg text-primary tracking-widest uppercase glow-active inline-block px-8 py-2 border-x border-primary/20">ŞANLI ZAFER</h1>
<p class="font-headline-sm text-headline-sm text-secondary mt-4 uppercase tracking-widest">Kuzey Cephesi Seferi</p>
</header>
<!-- Content Body -->
<div class="p-8 md:p-12 flex flex-col md:flex-row gap-8">
<!-- Left Column: Summary & ELO -->
<div class="flex-1 flex flex-col gap-6">
<!-- ELO Change -->
<div class="imperial-border bg-surface-container-high p-6 flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-secondary text-5xl mb-2" style="font-variation-settings: 'FILL' 1;">military_tech</span>
<div class="font-headline-md text-headline-md text-secondary">+24 Rütbe Puanı</div>
<div class="font-label-caps text-label-caps text-on-surface-variant mt-2 uppercase">Yeni Derece: İmparatorluk Muhafızı</div>
</div>
<!-- Match Summary List -->
<div class="flex flex-col gap-unit">
<div class="font-label-caps text-label-caps text-secondary uppercase tracking-widest mb-2 border-b border-secondary/20 pb-1">Sefer Özeti</div>
<div class="flex justify-between items-center py-2 data-bracket">
<span class="font-data-tabular text-data-tabular text-on-surface-variant">[001-T] Süre</span>
<span class="font-body-md text-body-md text-on-surface">45:12</span>
</div>
<div class="flex justify-between items-center py-2 data-bracket">
<span class="font-data-tabular text-data-tabular text-on-surface-variant">[002-H] Toplam Hamle</span>
<span class="font-body-md text-body-md text-on-surface">84</span>
</div>
<div class="flex justify-between items-center py-2 data-bracket">
<span class="font-data-tabular text-data-tabular text-on-surface-variant">[003-E] Esir Alınan Birimler</span>
<span class="font-body-md text-body-md text-on-surface">12</span>
</div>
</div>
</div>

<div class="font-label-caps text-label-caps text-secondary uppercase tracking-widest mb-2 border-b border-secondary/20 pb-1">Taktiksel Performans Analizi</div>
<!-- Stat Bar: Taktiksel Deha -->
<div class="flex flex-col gap-1">
<div class="flex justify-between font-label-caps text-label-caps text-on-surface-variant">
<span>Taktiksel Deha</span>
<span class="text-secondary">92%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest border border-surface-variant flex">

</div>
</div>

<div class="flex justify-between font-label-caps text-label-caps text-on-surface-variant">

</div>
<div class="h-2 w-full bg-surface-container-highest border border-surface-variant flex">
<div class="h-full bg-secondary w-[85%] relative">
<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjQiIGZpbGw9IiMxMzEzMTYiIG9wYWNpdHk9IjAuNSIvPjwvc3ZnPg==')]"></div>

<div class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">history</span>
<span class="font-headline-sm text-headline-sm text-secondary uppercase tracking-wide z-10">Seferi Yeniden İzle</span>

</button>

</div>
