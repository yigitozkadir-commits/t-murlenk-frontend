<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TİMURLENK SATRANCI - Splash Screen</title>
<!-- Font Setup -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration based on Design System -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#131316',
            'surface-dim': '#131316',
            'surface-bright': '#39393c',

            torchFlicker: {

              '50%': { textShadow: '0 0 15px rgba(203, 160, 82, 0.8), 0 0 30px rgba(203, 160, 82, 0.5)' },
              '100%': { textShadow: '0 0 8px rgba(203, 160, 82, 0.4), 0 0 15px rgba(203, 160, 82, 0.2)' },
            }
          }
        }

<!-- Custom Styles -->
<style data-purpose="layout">
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #0e0e11;
    }
    .splash-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.85;
      /* Add a subtle vignette to enhance the torch-lit feel */
      box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(26,22,17,0.1) 0%, rgba(14,14,17,0.8) 100%);
      z-index: 1;
    }
    .content-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
  </style>
<style data-purpose="typography">
    .title {
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 1.1;
      letter-spacing: 0.1em;
      color: transparent;
      background: linear-gradient(to bottom, #fde08b, #cba052, #8c6d3d);
      -webkit-background-clip: text;
      background-clip: text;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
    }
    .quote {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      font-style: italic;
      color: #cba052;
      opacity: 0.8;
      margin-top: 10vh;
      letter-spacing: 0.05em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    }
    .start-prompt {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      letter-spacing: 0.3em;
      color: #e0d0b0;
      text-transform: uppercase;
      margin-top: auto;
      margin-bottom: 10vh;
      cursor: pointer;
    }
  </style>
</head>
<body class="font-serif text-white antialiased select-none">
<!-- BEGIN: SplashScreen -->
<main class="splash-container animate-fade-in" id="splash-screen">
<!-- Background Image -->
<img alt="Timurlenk Satrancı Background" class="bg-image" draggable="false" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDDxhKP6Hrzphba20TUmV3-50hRF7gkoBGt4wojJae-hz_Ga4jXTjvFlzJdGoagEh55WS7XaiBJ4I8K_bHjIvjK5j37aETikHWb9tGD9HSs4uqolrJmlztE-KZ0K5g8xBweInc3rcLKIA945Jx9crvJFSmb79oaqdmlTTVK5S1cu_b6ZKEYAo4HBiN5RPhRkx6IvJqXUrWfe6ocjOtdFfT2KT3z-oFWWk1mBhipjfHTfg7dkiXyyQ-pol1ye7BKQzerk67U8AzF7T07"/>
<!-- Atmospheric Overlay -->
<div class="overlay pointer-events-none"></div>
<!-- Content -->
<div class="content-wrapper">
<!-- Title Area -->
<div class="mt-auto flex flex-col items-center">
<h1 class="title animate-torch-flicker">
          TİMURLENK<br/>SATRANCI
        </h1>
</div>
<!-- Quote Area -->
<div class="quote">
        "Zekâ gökten iner, toprağa kök salar."
      </div>
<!-- Interaction Prompt -->
<div class="start-prompt animate-pulse-slow mt-auto" id="start-button" role="button" tabindex="0">
        Click to Start
      </div>
</div>
</main>
<!-- END: SplashScreen -->
<!-- Interaction Script -->
<script data-purpose="interaction">
    document.addEventListener('DOMContentLoaded', () => {
      const splashScreen = document.getElementById('splash-screen');
      const startButton = document.getElementById('start-button');

      const handleStart = () => {
        // Example transition effect
        splashScreen.style.transition = 'opacity 1s ease-out, filter 1s ease-out';
        splashScreen.style.opacity = '0';
        splashScreen.style.filter = 'blur(10px)';
        
        // In a real app, this would trigger navigation or state change
        setTimeout(() => {
          console.log('Transition to game menu...');
        }, 1000);
      };

      // Handle both click and touch events
      splashScreen.addEventListener('click', handleStart);
      splashScreen.addEventListener('touchstart', handleStart);
      
      // Accessibility: Allow Enter/Space to start if focused
      startButton.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleStart();
        }
      });
    });
  </script>
</body></html>
